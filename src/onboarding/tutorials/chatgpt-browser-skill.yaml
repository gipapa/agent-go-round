id: chatgpt-browser-skill
title: "[6] 使用多輪 Skill 操作 GitHub Trending"
description: 使用 multi-turn skill 結合 agent-browser MCP，以單一對話完成瀏覽器自動化流程：直接開啟 GitHub Trending、點進第一名 repo，最後整理頁面內容回報給使用者。
exitTitle: 離開案例教學
exitBody: 離開導覽時，可以選擇是否保留這次教學期間新增或修改的工具、文件、MCP 與 skills。Agent、Credentials、Profile 與聊天紀錄會保留，方便你回到一般介面後繼續操作。
steps:
  - id: intro
    title: 認識多輪 Skill + agent-browser 案例
    checklistLabel: 認識案例目標
    instructionTitle: multi-turn browser skill 測試案例
    instructionBody: |
      這個案例會帶你完成：
      - 建立一個專門操作瀏覽器的 multi-turn skill
      - 讓 skill 使用 `agent-browser` MCP
      - 用一則對話完成：直接打開 GitHub Trending、點進第一名 repo、最後讀回 repo 內容摘要
      - 使用者若明確要求「視窗模式 / headed mode」，就直接照要求用可見瀏覽器開啟
      - 若使用者沒有特別指定，預設先嘗試 headless 瀏覽器
      - 若頁面出現登入、驗證、同意頁或其他人工關卡，先用系統工具詢問你是否改用可見瀏覽器
      - 只有你確認同意後，才改用可見瀏覽器並請你手動完成
      - 若頁面明確顯示目前環境無法繼續操作，也會把 blocked 狀態整理成最終回覆，避免無限重試

      注意：
      - 這個案例需要本地端執行程式，建議使用 Windows 的 WSL、Linux、或 macOS 環境
      - 因為流程會依頁面狀態決定下一步，所以這裡會使用 multi-turn skill
      - 這個案例會在中途帶你註冊 `教學用MCP`，並授權給目前 Agent 使用
      - GitHub Trending 一般比 Google AI 或登入型網站穩定，更適合驗證多輪 browser workflow
    behavior: manual_info
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: set-history-limit
    title: 先把對話歷史縮到 1 則
    checklistLabel: 將對話歷史改為 1
    instructionTitle: 先把送給模型的歷史訊息數量改成 1
    instructionBody: |
      這個案例會用到多輪 skill 與多步 MCP 工具流程，為了避免免費模型因為上下文過長而吃滿 context，請先前往 Chat Config > History。

      請把：
      - `Messages sent to model`

      改成：
      - `1`

      案例結束後，系統會自動把這個值恢復成你原本的設定。
    tab: chat_config
    targetId: chat-config-history-card
    behavior: set_history_limit_to_one
    completionLabel: 等待將 Messages sent to model 改成 1
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: configure_runtime
    title: 切換到多輪 Skill 執行模式
    checklistLabel: 啟用 multi-turn skill runtime
    instructionTitle: 系統會自動切換成 multi-turn skill
    instructionBody: |
      這個案例需要：
      - 多步工具流程
      - browser_open / snapshot / click / fill / wait 的連續動作
      - 最後再做 verify / refine

      因此系統會自動幫你設定：
      - Skills runtime：`多輪 refine`
      - 工具步數上限：`8`
      - Verify 次數：`2`
      - 教學用 load balancer instance delay：`10 秒`
      - 教學用 load balancer instance retries：`10`

      你可以稍後到 Chat Config > Skills 查看這些設定。
    behavior: manual_info
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      loadBalancerDelaySecond: 10
      loadBalancerMaxRetries: 10

  - id: create-multi-load-balancer
    title: 建立第二個 Load Balancer
    checklistLabel: 建立三個 instance 的 Load Balancer
    instructionTitle: 先補更多 key，建立給案例 6 用的第二個 Load Balancer
    instructionBody: |
      這個案例的 multi-turn skill 比一般單輪對話更容易吃到模型額度，所以建議先準備更多可切換的 instances。

      請回到 Chat Config，打開 Credentials 設定。

      這一步請先補出第二個可用來源：
      - 新增第二把 key，或
      - 新增另一個 provider

      當系統偵測到第二個可用來源後，會自動建立 `教學用Load Balancer 2`，其中三個 instances 會是：
      - Instance 1：沿用目前對話用的 provider / key，model=`moonshotai/kimi-k2-instruct-0905`
      - Instance 2：沿用同一把 key，但 model 改成 `groq/compound`
      - Instance 3：改用你剛新增的另一把 key 或另一個 provider，model=`moonshotai/kimi-k2-instruct-0905`

      這個案例不會驗證 failover 是否真的發生；這一步只確認第二個 load balancer 已建立完成。
    completionLabel: 等待你新增第二把 key / 其他 provider，並讓系統建立第二個 Load Balancer
    tab: chat_config
    targetId: chat-config-credentials-card
    behavior: create_multi_load_balancer
    actionLabel: 下一步

  - id: switch-agent-load-balancer
    title: 切換 Agent 使用第二個 Load Balancer
    checklistLabel: 切換 Agent 到第二個 Load Balancer
    instructionTitle: 先把目前 Agent 切到第二個 Load Balancer
    instructionBody: |
      請前往 Agents，編輯目前的 Agent。

      將它的 Load Balancer 改成：
      - `教學用Load Balancer 2`

      之後按下 Save。
    completionLabel: 等待你把 Agent 改綁到第二個 Load Balancer
    tab: agents
    targetId: agents-edit-active-button
    behavior: switch_tutorial_agent_to_multi_load_balancer
    actionLabel: 下一步

  - id: register_mcp
    title: 註冊 agent-browser MCP
    checklistLabel: 註冊教學用MCP
    instructionTitle: 請先把 agent-browser MCP 註冊到系統中
    instructionBody: |
      請前往 Chat Config 頁籤，按下 MCP 進入設定視窗。

      請新增一筆 MCP，建議名稱使用：
      - `教學用MCP`

      SSE URL 請填入你剛剛在本地端啟動 `./mcp-test/run.sh -agent_browser` 後看到的位址，例如：
      - `http://127.0.0.1:3334/mcp/sse`
      - 或 WSL IP 版本：`http://172.xx.xx.xx:3334/mcp/sse`

      接著請按下：
      - `Connect & List Tools`
      - 確認列表中至少出現 `browser_open`、`browser_snapshot`、`browser_click`、`browser_fill`
      - 最後按 `Save`
    tab: chat_config
    targetId: chat-config-mcp-card
    behavior: register_tutorial_agent_browser_mcp
    completionLabel: 等待完成教學用MCP註冊
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: enable_mcp_access
    title: 讓 Agent 可以使用教學用MCP
    checklistLabel: 開啟 Agent MCP 權限
    instructionTitle: 到 Agents 頁把教學用MCP 授權給目前 Agent
    instructionBody: |
      請前往 Agents，編輯目前的 Agent。

      在 Access Control 裡：
      1. 打開 `MCP Tools`
      2. 若你選擇 `All` 也可以
      3. 若你選擇 `Custom selection`，請至少勾選 `教學用MCP`

      完成後按下 `Save`。
    tab: agents
    targetId: agents-edit-active-button
    behavior: enable_tutorial_mcp_access
    completionLabel: 等待 Agent 開啟教學用MCP 權限
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: create_browser_skill
    title: 建立 Browser workflow skill
    checklistLabel: 建立 Browser workflow skill
    instructionTitle: 系統會自動建立一個 multi-turn browser skill
    instructionBody: |
      這個 skill 會包含：
      - `SKILL.md`
      - `references/browser-workflow-playbook.md`
      - `assets/browser-workflow-report-template.md`

      它的重點是：
      - 先為任務建立起始網址與 todo
      - 若使用者明確要求視窗模式，就直接用 headed browser 開始流程
      - 若使用者沒有特別指定，預設先用 headless browser 開始流程
      - 只有遇到登入、驗證或 consent 關卡才用系統工具詢問是否切成 headed browser
      - 若頁面明確表示目前不可用，會直接總結 blocked 狀態
      - 否則再繼續 snapshot / click / fill / wait / 讀取回應
    tab: chat_config
    targetId: chat-config-skills-card
    behavior: ensure_tutorial_chatgpt_browser_skill
    completionLabel: 等待系統建立教學用 Browser workflow skill
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      loadBalancerDelaySecond: 10
      loadBalancerMaxRetries: 10

  - id: enable_browser_skill
    title: 讓 Agent 可以使用 Browser workflow skill
    checklistLabel: 開啟 Agent 的 browser skill 權限
    instructionTitle: 到 Agents 頁把 browser skill 授權給目前 Agent
    instructionBody: |
      請前往 Agents，編輯目前的 Agent。

      在 Access Control 裡：
      1. 打開 `Skills`
      2. 若你選擇 `All` 也可以
      3. 若你選擇 `Custom selection`，請至少勾選 `Browser Workflow Multi-turn Skill`

      完成後按下 `Save`。
    tab: agents
    targetId: agents-edit-active-button
    behavior: enable_tutorial_chatgpt_browser_skill_access
    completionLabel: 等待 Agent 開啟 Browser workflow skill 權限
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      loadBalancerDelaySecond: 10
      loadBalancerMaxRetries: 10

  - id: run_chatgpt_flow
    title: 用一則對話完成 GitHub Trending 流程
    checklistLabel: 使用 skill 完成開站、點擊與摘要
    instructionTitle: 單一對話：完成整個 GitHub Trending 瀏覽器流程
    instructionBody: |
      我已經幫你切到 Chat，並填好測試問題。

      這一題想測的是：
      - skill 是否會真的載入
      - 是否會先用 `browser_open` 打開最直接的 GitHub Trending 網址
      - 是否會繼續使用 `browser_snapshot` / `browser_click` / `browser_wait`
      - 是否會點進第一名 repo，而不是停在列表頁
      - 是否會把 repo 頁面的標題、描述與主要內容整理成最終回答
      - 若頁面出現登入、驗證、同意頁或其他人工關卡，是否會先使用系統工具詢問，再改用可見瀏覽器並請你手動完成

      你也可以額外試試看這句：
      - `用視窗模式幫我打開 https://github.com/trending，點進第一名的 repo，然後告訴我它的內容摘要`

      這一句會用來確認：
      - skill 會依照使用者明確要求，直接用可見瀏覽器啟動
      - 而不是一律先走 headless
    tab: chat
    targetId: chat-input
    behavior: first_chat_skill_chatgpt_ask
    completionLabel: 等待 Agent 使用 multi-turn skill 完成整個 GitHub Trending 流程，必要時展開 tool result 查看細節
    actionLabel: 完成案例教學
    automation:
      clearChatOnEnter: true
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      loadBalancerDelaySecond: 10
      loadBalancerMaxRetries: 10
      composerSeed: 幫我打開 https://github.com/trending，點進第一名的 repo，然後告訴我它的內容摘要
      activeAgentPreset: tutorial_agent_base
      expect:
        userPrompt: 幫我打開 https://github.com/trending，點進第一名的 repo，然後告訴我它的內容摘要
        requireAssistant: true
        requireSkillTodo: true
        requireSkillTodoProgress: true
        successfulToolMessageIncludes:
          - MCP 教學用MCP -> browser_open
          - MCP 教學用MCP -> browser_snapshot
          - MCP 教學用MCP -> browser_click
        requireOpenedToolResult: true
        skillLoadContainsAny:
          - browser-workflow-multiturn
          - browser-workflow-multi-turn-skill
        assistantContentIncludesAny:
          - GitHub
          - repo
          - repository
          - README
          - 專案
          - blocked
