id: chatgpt-browser-skill
title: "[6] 使用多輪 Skill 操作 Google AI 模式"
description: 使用 multi-turn skill 結合 agent-browser MCP，以單一對話完成 Google AI Mode 自動化流程：先 headless 開站、必要時用系統工具詢問是否切 visible browser，再輸入問題並讀取回應。
exitTitle: 離開案例教學
exitBody: 離開導覽時，可以選擇是否保留這次教學期間新增或修改的工具、文件、MCP 與 skills。Agent、Credentials、Profile 與聊天紀錄會保留，方便你回到一般介面後繼續操作。
steps:
  - id: intro
    title: 認識多輪 Skill + agent-browser 案例
    checklistLabel: 認識案例目標
    instructionTitle: multi-turn browser skill 測試案例
    instructionBody: |
      這個案例會帶你完成：
      - 建立一個專門操作瀏覽器的 multi-turn skill
      - 讓 skill 使用案例 5 已註冊好的 `agent-browser` MCP
      - 用一則對話完成：直接打開 Google AI 模式、輸入「你是什麼模型，還有今天台北天氣如何」、最後讀回回應
      - 預設先嘗試 headless 瀏覽器
      - 若頁面出現登入、驗證、同意頁或其他人工關卡，先用系統工具詢問你是否改用可見瀏覽器
      - 只有你確認同意後，才改用可見瀏覽器並請你手動完成
      - 若目前環境明確顯示「無法使用 AI 模式」，也會把這個 blocked 狀態整理成最終回覆，避免無限重試

      注意：
      - 這個案例需要本地端執行程式，建議使用 Windows 的 WSL、Linux、或 macOS 環境
      - 因為流程會依頁面狀態決定下一步，所以這裡會使用 multi-turn skill
      - 這個案例依賴案例 5 已經完成：你需要先有 `教學用MCP`，而且其中要能使用 `browser_open`、`browser_snapshot`、`browser_click`、`browser_fill`、`browser_wait`
      - Google AI 模式可能會顯示登入、驗證或其他同意步驟；若出現，skill 會先詢問你是否改用 visible browser，再請你在那裡手動完成
    behavior: manual_info
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: set-history-limit
    title: 先把對話歷史縮到 1 則
    checklistLabel: 將對話歷史改為 1
    instructionTitle: 先把送給模型的歷史訊息數量改成 1
    instructionBody: |
      這個案例會用到多輪 skill 與多步 MCP 工具流程，為了避免免費模型因為上下文過長而吃滿 context，請先前往 Chat Config > History & Retry。

      請把：
      - `Messages sent to model`

      改成：
      - `1`

      案例結束後，系統會自動把這個值恢復成你原本的設定。
    tab: chat_config
    targetId: chat-config-history-card
    behavior: set_history_limit_to_one
    completionLabel: 等待將 Messages sent to model 改成 1
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base

  - id: configure_runtime
    title: 切換到多輪 Skill 執行模式
    checklistLabel: 啟用 multi-turn skill runtime
    instructionTitle: 系統會自動切換成 multi-turn skill
    instructionBody: |
      這個案例需要：
      - 多步工具流程
      - browser_open / snapshot / click / fill / wait 的連續動作
      - 最後再做 verify / refine

      因此系統會自動幫你設定：
      - Skills runtime：`多輪 refine`
      - 工具步數上限：`8`
      - Verify 次數：`2`
      - Retry delay：`10 秒`
      - Retry 次數：`10`

      你可以稍後到 Chat Config > Skills 查看這些設定。
    behavior: manual_info
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      retryDelaySec: 10
      retryMax: 10

  - id: create_browser_skill
    title: 建立 Google AI browser skill
    checklistLabel: 建立 Google AI browser skill
    instructionTitle: 系統會自動建立一個 multi-turn browser skill
    instructionBody: |
      這個 skill 會包含：
      - `SKILL.md`
      - `references/google-ai-browser-playbook.md`
      - `assets/google-ai-browser-report-template.md`

      它的重點是：
      - 先用 headless browser 直接開啟 Google AI 模式
      - 只有遇到登入、驗證或 consent 關卡才用系統工具詢問是否切成 headed browser
      - 若頁面明確表示 AI 模式目前不可用，會直接總結 blocked 狀態
      - 否則再繼續 snapshot / fill / click / wait / 讀取回應
    tab: chat_config
    targetId: chat-config-skills-card
    behavior: ensure_tutorial_chatgpt_browser_skill
    completionLabel: 等待系統建立教學用 Google AI browser skill
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      retryDelaySec: 10
      retryMax: 10

  - id: enable_browser_skill
    title: 讓 Agent 可以使用 Google AI browser skill
    checklistLabel: 開啟 Agent 的 browser skill 權限
    instructionTitle: 到 Agents 頁把 browser skill 授權給目前 Agent
    instructionBody: |
      請前往 Agents，編輯目前的 Agent。

      在 Access Control 裡：
      1. 打開 `Skills`
      2. 若你選擇 `All` 也可以
      3. 若你選擇 `Custom selection`，請至少勾選 `Google AI Browser Multi-turn Skill`

      完成後按下 `Save`。
    tab: agents
    targetId: agents-edit-active-button
    behavior: enable_tutorial_chatgpt_browser_skill_access
    completionLabel: 等待 Agent 開啟 Google AI browser skill 權限
    actionLabel: 下一步
    automation:
      activeAgentPreset: tutorial_agent_base
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      retryDelaySec: 10
      retryMax: 10

  - id: run_chatgpt_flow
    title: 用一則對話完成 Google AI 流程
    checklistLabel: 使用 skill 完成開站、輸入、送出與讀取回應
    instructionTitle: 單一對話：完成整個 Google AI 瀏覽器流程
    instructionBody: |
      我已經幫你切到 Chat，並填好測試問題。

      這一題想測的是：
      - skill 是否會真的載入
      - 是否會先用 `browser_open` 的 headless 模式打開 `https://google.com/ai`
      - 若頁面正常可用，是否會繼續使用 `browser_snapshot` / `browser_fill` / `browser_click` / `browser_wait`
      - 若頁面明確顯示目前環境無法使用 AI 模式，是否會把這個 blocked 狀態整理成最終回答
      - 若頁面出現登入、驗證、同意頁或其他人工關卡，是否會先使用系統工具詢問，再改用可見瀏覽器並請你手動完成
      - 最後是否會把真正讀到的回答整理給你，而不是停在「我幫你打開網站了」
    tab: chat
    targetId: chat-input
    behavior: first_chat_skill_chatgpt_ask
    completionLabel: 等待 Agent 使用 multi-turn skill 完成整個 Google AI 流程，必要時展開 tool result 查看細節
    actionLabel: 完成案例教學
    automation:
      clearChatOnEnter: true
      skillExecutionMode: multi_turn
      skillToolLoopMax: 8
      skillVerifyMax: 2
      retryDelaySec: 10
      retryMax: 10
      composerSeed: 請幫我打開 Google AI 模式並詢問「你是什麼模型，還有今天台北天氣如何」
      activeAgentPreset: tutorial_agent_base
      expect:
        userPrompt: 請幫我打開 Google AI 模式並詢問「你是什麼模型，還有今天台北天氣如何」
        requireAssistant: true
        requireSkillTodo: true
        requireSkillTodoProgress: true
        successfulToolMessageIncludes:
          - MCP 教學用MCP -> browser_open
          - MCP 教學用MCP -> browser_snapshot
        requireOpenedToolResult: true
        skillLoadContainsAny:
          - google-ai-browser-multiturn
          - google-ai-browser-multi-turn-skill
        assistantContentIncludesAny:
          - 你是什麼模型
          - AI 模式
          - 無法使用 AI 模式
          - 目前無法使用 AI 模式
          - unusual traffic
          - reCAPTCHA
          - 驗證你是真人
          - 安全驗證
