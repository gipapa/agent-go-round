id: skill-verify.zh
title: Skill Verify Prompt（中文）
category: skill_runtime
language: zh
description: 控制多輪 skill refine 中 verifier 判斷 pass / refine 的 prompt。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{loadedReferences}}"
  - "{{loadedAssets}}"
  - "{{round}}"
  - "{{userInput}}"
  - "{{currentInput}}"
  - "{{answer}}"
template: |
  請只回傳一個 JSON 物件。不要加說明、不要加 markdown。

  任務：驗證一段經過 skill 輔助後產生的回答。

  規則：
  - 優先 pass。
  - 只有在明顯失敗時才 refine：流程錯、缺必要驗證、或明顯漏用可用工具 / reference。
  - reason 要短。

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}
  REFERENCES:
  {{loadedReferences}}
  ASSETS:
  {{loadedAssets}}

  ROUND:
  {{round}}

  USER_REQUEST:
  {{userInput}}

  EFFECTIVE_PROMPT:
  {{currentInput}}

  ANSWER:
  {{answer}}

  允許的 JSON：
  {"type":"pass","reason":"..."}
  {"type":"refine","reason":"...","revisionPrompt":"..."}
