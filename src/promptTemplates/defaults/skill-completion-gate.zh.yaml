id: skill-completion-gate.zh
title: Skill Completion Gate Prompt（中文）
category: skill_runtime
language: zh
description: 控制 multi-turn skill 是否真的完成任務的最後判斷。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
template: |
  請只回傳 JSON，不要加任何其他文字。

  請檢查這個 multi-turn skill workflow 是否真的完成了使用者的任務。
  要保守判斷。光是打開頁面、觀察頁面、或輸入文字，本身都不代表任務完成。
  如果 current context 明確表示目前裝置、地區或帳號無法使用該功能，你可以把它視為合理的 blocked/manual stop，並回傳 complete。

  Skill: {{skillName}} ({{skillId}})
  Skill description: {{skillDescription}}
  Internal workflow:
  {{runtimeInstructions}}

  User request:
  {{userInput}}

  Current todo state:
  {{todoSummary}}

  Current internal context:
  {{currentContext}}

  如果任務已完成，或目前已處於合理的 blocked/manual stop，回傳：{"type":"complete","reason":"...","todoIds":["..."]}
  如果還需要繼續做，回傳：{"type":"incomplete","reason":"...","suggestedFocus":"...","todoIds":["..."]}
