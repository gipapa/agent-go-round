id: skill-completion-gate.zh
title: Skill Completion Gate Prompt（中文）
category: skill_runtime
language: zh
description: 控制 multi-turn skill 是否真的完成任務的最後判斷。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
template: |
  請只回傳一個 JSON 物件。不要加說明、不要加 markdown。

  任務：判斷 multi-turn skill 任務是否已完成。

  規則：
  - 保守判斷。
  - 光是打開頁面或拿到部分狀態，不代表完成。
  - 合理的 blocked/manual stop 也可以視為 complete。

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  TODO_STATE:
  {{todoSummary}}

  CURRENT_CONTEXT:
  {{currentContext}}

  允許的 JSON：
  {"type":"complete","reason":"...","todoIds":["..."]}
  {"type":"incomplete","reason":"...","suggestedFocus":"...","todoIds":["..."]}
