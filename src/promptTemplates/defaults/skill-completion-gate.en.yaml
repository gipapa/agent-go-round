id: skill-completion-gate.en
title: Skill Completion Gate Prompt (English)
category: skill_runtime
language: en
description: Controls the final completion check for multi-turn skill runtime.
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: decide whether the multi-turn skill task is complete.

  Rules:
  - Be conservative.
  - Opening a page or collecting partial state is not enough by itself.
  - A justified blocked/manual stop may still count as complete.

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  TODO_STATE:
  {{todoSummary}}

  CURRENT_CONTEXT:
  {{currentContext}}

  Allowed JSON:
  {"type":"complete","reason":"...","todoIds":["..."]}
  {"type":"incomplete","reason":"...","suggestedFocus":"...","todoIds":["..."]}
