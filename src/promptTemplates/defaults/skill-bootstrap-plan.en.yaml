id: skill-bootstrap-plan.en
title: Skill Bootstrap Plan Prompt (English)
category: skill_runtime
language: en
description: Controls the initial multi-turn skill todo plan and startUrl inference.
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: create a short internal bootstrap plan for a multi-turn skill.

  Rules:
  - taskSummary: one short sentence.
  - todo: 3 to 6 concise milestones.
  - If a direct stable start URL is obvious, include it.
  - Prefer canonical direct pages over generic homepages.
  - For GitHub Trending, prefer https://github.com/trending?since=daily.

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  Return:
  {"taskSummary":"...","startUrl":"https://... or empty string","todo":["...","..."]}
