id: skill-decision.zh
title: Skill Decision Prompt（中文）
category: skill_decision
language: zh
description: 控制每一輪是否先載入某個 skill，再進入一般 tool decision。
placeholders:
  - "{{userInput}}"
  - "{{skillListJson}}"
template: |
  請只回傳 JSON，不要加任何其他文字。

  請判斷這一回合是否需要先載入一個 skill workflow，再進入一般 tool decision。

  使用者提問如下:
  {{userInput}}

  可用 skills 如下:
  {{skillListJson}}

  如果不需要 skill，回傳：{"type":"no_skill"}

  如果需要載入一個 skill，回傳：{"type":"skill_call","skillId":"...","input":{}}

  一次只能選一個 skill。
