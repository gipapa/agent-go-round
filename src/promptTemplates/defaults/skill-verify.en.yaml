id: skill-verify.en
title: Skill Verify Prompt (English)
category: skill_runtime
language: en
description: Controls the verifier prompt for multi-turn skill refine.
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{loadedReferences}}"
  - "{{loadedAssets}}"
  - "{{round}}"
  - "{{userInput}}"
  - "{{currentInput}}"
  - "{{answer}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: verify an internal skill-assisted answer.

  Rules:
  - Prefer pass.
  - Choose refine only for a clear failure: wrong workflow, missing required verification, or missed obvious tool/reference usage.
  - Keep reason short.

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}
  REFERENCES:
  {{loadedReferences}}
  ASSETS:
  {{loadedAssets}}

  ROUND:
  {{round}}

  USER_REQUEST:
  {{userInput}}

  EFFECTIVE_PROMPT:
  {{currentInput}}

  ANSWER:
  {{answer}}

  Allowed JSON:
  {"type":"pass","reason":"..."}
  {"type":"refine","reason":"...","revisionPrompt":"..."}
