id: skill-decision.en
title: Skill Decision Prompt (English)
category: skill_decision
language: en
description: Controls whether a reusable skill should be loaded before normal tool selection.
placeholders:
  - "{{userInput}}"
  - "{{skillListJson}}"
template: |
  Return JSON only. Do not add any other text.

  Decide whether this turn should load one reusable skill workflow before normal tool selection.

  User request:
  {{userInput}}

  Available skills:
  {{skillListJson}}

  If no skill is needed, return: {"type":"no_skill"}

  If one skill should be loaded, return: {"type":"skill_call","skillId":"...","input":{}}

  Only choose one skill.
