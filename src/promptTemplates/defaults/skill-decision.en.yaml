id: skill-decision.en
title: Skill Decision Prompt (English)
category: skill_decision
language: en
description: Controls whether a reusable skill should be loaded before normal tool selection.
placeholders:
  - "{{userInput}}"
  - "{{skillListJson}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: decide whether this turn should load one reusable skill before normal tool selection.

  Rules:
  - Choose no_skill unless one skill clearly matches the user request.
  - Choose at most one skill.
  - Use exact skillId from SKILL_CATALOG.
  - Keep input as {} unless the request clearly needs structured input.

  USER_REQUEST:
  {{userInput}}

  SKILL_CATALOG:
  {{skillListJson}}

  Allowed JSON:
  {"type":"no_skill"}
  {"type":"skill_call","skillId":"...","input":{}}

  Examples:
  - calm, structured, step-by-step explanation -> sequential thinking skill
  - open page, click target, read page content -> browser workflow skill
