id: skill-planner-step.en
title: Skill Planner Step Prompt (English)
category: skill_runtime
language: en
description: Controls each observe / act / ask_user / finish decision for multi-turn skill runtime.
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
  - "{{toolScopeSummary}}"
  - "{{constraintBlock}}"
  - "{{currentPhaseHint}}"
  - "{{allowedOutputs}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: choose the next internal step for a multi-turn skill runtime.

  Rules:
  - Do not answer the user directly.
  - Prefer the smallest step that clearly advances the workflow.
  - Do not reopen/reset state unless the current state is clearly missing or invalid.
  - If interactive targets already exist, prefer act over another observe.
  - If human login, consent, or verification is required, prefer ask_user.
  - If the feature is clearly unavailable and no tool can recover it, choose finish.

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  TODO_STATE:
  {{todoSummary}}

  CURRENT_CONTEXT:
  {{currentContext}}

  AVAILABLE_TOOLS:
  {{toolScopeSummary}}

  {{constraintBlock}}
  {{currentPhaseHint}}

  {{allowedOutputs}}
