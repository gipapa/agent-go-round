id: tool-decision.en
title: Tool Decision Prompt (English)
category: tool_decision
language: en
description: Controls the preflight prompt used to decide whether this turn needs a tool.
placeholders:
  - "{{userInput}}"
  - "{{toolListJson}}"
  - "{{noToolJson}}"
  - "{{userProfileJson}}"
  - "{{builtinToolJson}}"
  - "{{mcpCallJson}}"
template: |
  Return exactly one JSON object. No prose. No markdown.

  Task: decide whether this turn needs a tool.

  Rules:
  - Choose no_tool unless a tool is clearly required.
  - Use exact tool names from TOOL_CATALOG.
  - Prefer get_user_profile only for questions about the current user.
  - Prefer builtin tools for browser-side JS/UI actions.
  - Prefer MCP tools for browser automation or external tool actions.

  USER_REQUEST:
  {{userInput}}

  TOOL_CATALOG:
  {{toolListJson}}

  Allowed JSON:
  NO_TOOL = {{noToolJson}}
  USER_PROFILE = {{userProfileJson}}
  BUILTIN = {{builtinToolJson}}
  MCP = {{mcpCallJson}}

  Examples:
  - "Who am I?" -> {"type":"builtin_tool_call","tool":"get_user_profile","input":{}}
  - "Open a clock dashboard in the page" -> {"type":"builtin_tool_call","tool":"...","input":{}}
  - "Say hello" -> {"type":"no_tool"}
