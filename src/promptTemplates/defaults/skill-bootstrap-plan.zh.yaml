id: skill-bootstrap-plan.zh
title: Skill Bootstrap Plan Prompt（中文）
category: skill_runtime
language: zh
description: 控制 multi-turn skill 初始 todo 與 startUrl 推論。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
template: |
  請只回傳一個 JSON 物件。不要加說明、不要加 markdown。

  任務：為 multi-turn skill 建立簡短的 bootstrap plan。

  規則：
  - taskSummary：一句短句。
  - todo：3 到 6 個精簡里程碑。
  - 如果可以明確推論穩定的直接 startUrl，就填入。
  - 優先 canonical direct page，不要先走 generic homepage。
  - GitHub Trending 優先用 https://github.com/trending?since=daily。

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  回傳：
  {"taskSummary":"...","startUrl":"https://... or empty string","todo":["...","..."]}
