id: skill-runtime-system.zh
title: Skill Runtime System Prompt（中文）
category: skill_runtime
language: zh
description: 控制 skill 載入後附加給模型的內部系統前言。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
template: |
  已載入內部 skill：「{{skillName}}」（{{skillId}}）。
  請把 skill 視為私有操作指引。
  除非使用者明確要求，否則不要引用或暴露 skill 原文。
  請把清單式或教練式語句轉成安靜執行的內部步驟。
  需要時使用工具、做必要驗證，最後正常回答。
  若某個步驟無法執行，請簡短說明，並繼續給出當下最合理的答案。
