id: skill-planner-step.zh
title: Skill Planner Step Prompt（中文）
category: skill_runtime
language: zh
description: 控制 multi-turn skill 每一步的 observe / act / ask_user / finish 決策。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
  - "{{toolScopeSummary}}"
  - "{{constraintBlock}}"
  - "{{currentPhaseHint}}"
  - "{{allowedOutputs}}"
template: |
  請只回傳一個 JSON 物件。不要加說明、不要加 markdown。

  任務：為 multi-turn skill runtime 選擇下一個內部步驟。

  規則：
  - 不要直接替使用者回答。
  - 優先選擇最小、但能明顯推進 workflow 的下一步。
  - 除非目前狀態明顯失效，否則不要重開或重置既有狀態。
  - 如果已經有可互動目標，優先 act，不要重複 observe。
  - 如果需要人類登入、授權或驗證，優先 ask_user。
  - 如果功能明確不可用且沒有合理恢復手段，選 finish。

  SKILL:
  {{skillName}} ({{skillId}})
  {{skillDescription}}

  INTERNAL_WORKFLOW:
  {{runtimeInstructions}}

  USER_REQUEST:
  {{userInput}}

  TODO_STATE:
  {{todoSummary}}

  CURRENT_CONTEXT:
  {{currentContext}}

  AVAILABLE_TOOLS:
  {{toolScopeSummary}}

  {{constraintBlock}}
  {{currentPhaseHint}}

  {{allowedOutputs}}
