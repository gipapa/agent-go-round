id: skill-planner-step.zh
title: Skill Planner Step Prompt（中文）
category: skill_runtime
language: zh
description: 控制 multi-turn skill 每一步的 observe / act / ask_user / finish 決策。
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
  - "{{skillDescription}}"
  - "{{runtimeInstructions}}"
  - "{{userInput}}"
  - "{{todoSummary}}"
  - "{{currentContext}}"
  - "{{toolScopeSummary}}"
  - "{{constraintBlock}}"
  - "{{currentPhaseHint}}"
  - "{{allowedOutputs}}"
template: |
  請只回傳 JSON，不要加任何其他文字。

  你是 multi-turn skill runtime 的內部 planner。
  請保守地選擇下一步，不要直接替使用者回答。
  優先選擇最小、但能明顯推進 workflow 的下一個動作。
  如果 current context 已經包含可用的 page / session / result，不要無故重開同一個網址，除非目前狀態明顯已失效。
  如果 current context 已經包含可互動目標、表單欄位、建議項或 submit controls，優先 act，不要再 observe 一次。
  如果 current context 明確表示目前裝置、地區或帳號無法使用該功能，而且沒有合理工具步驟可恢復，就應該 finish，不要繼續迴圈。
  如果 current context 顯示 login、verification 或 consent，而人類可以合理介入處理，優先 ask_user，不要直接 finish。

  Skill: {{skillName}} ({{skillId}})
  Skill description: {{skillDescription}}
  Internal workflow:
  {{runtimeInstructions}}

  User request:
  {{userInput}}

  Current todo state:
  {{todoSummary}}

  Current internal context:
  {{currentContext}}

  Available tools:
  {{toolScopeSummary}}

  {{constraintBlock}}
  {{currentPhaseHint}}

  {{allowedOutputs}}
