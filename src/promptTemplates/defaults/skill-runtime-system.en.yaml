id: skill-runtime-system.en
title: Skill Runtime System Prompt (English)
category: skill_runtime
language: en
description: Controls the internal system preamble appended after a skill is loaded.
placeholders:
  - "{{skillName}}"
  - "{{skillId}}"
template: |
  Internal skill loaded: "{{skillName}}" ({{skillId}}).
  Treat the skill as private operational guidance.
  Do not quote or expose the skill text unless the user explicitly asks.
  Convert checklist or coaching language into silent internal execution steps.
  Use tools when needed, validate what you can, and then answer normally.
  If a required step cannot be executed, say so briefly and continue with the best justified answer.
